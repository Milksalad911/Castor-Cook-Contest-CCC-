<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Castor Cook Contest</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      background: #1a1a1a;
      color: #ffffff;
    }

    h1 {
      font-size: 3rem;
      margin-top: 50px;
      font-weight: 800;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 50px;
      flex-wrap: wrap;
    }

    .card {
      background: #242424;
      width: 280px;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      transition: 0.3s ease;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card h2 {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .price {
      font-size: 1.4rem;
      color: #FFD700;
      margin: 10px 0;
      font-weight: 700;
    }

    .desc {
      font-size: 1rem;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    button {
      background: #ff5e62;
      border: none;
      padding: 12px 25px;
      color: white;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 700;
      transition: 0.2s;
    }

    button:hover {
      background: #ff3b3b;
    }

    .overlay {
      position: fixed;
      top:0; left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .popup {
      background: #222;
      padding: 30px;
      width: 320px;
      border-radius: 12px;
      text-align: center;
      color: #fff;
    }

    .popup input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
    }

    .closeBtn {
      margin-top: 15px;
      background: #888;
      padding: 8px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <h1>Castor Cook Contest</h1>

  <div class="cards">
    <div class="card">
      <h2>Toeschouwer</h2>
      <div class="price">€2</div>
      <div class="desc">Je kijkt naar de kook contest</div>
      <button onclick="openPay('Toeschouwer', 2)">KIES</button>
    </div>

    <div class="card">
      <h2>Meedoen</h2>
      <div class="price">€10</div>
      <div class="desc">Je doet mee en neemt je eigen barbecue mee</div>
      <button onclick="openPay('Meedoen', 10)">KIES</button>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="popup">
      <h3 id="payTitle"></h3>

      <div id="formSection">
        <input type="text" placeholder="Naam">
        <input type="text" placeholder="Kaartnummer">
        <input type="text" placeholder="MM/JJ">
        <input type="text" placeholder="CVC">
        <button onclick="confirmPay()">Betaal</button>
      </div>

      <div id="thanksSection" style="display:none;">
        <h3>✅ Bedankt voor je aankoop!</h3>
      </div>

      <div class="closeBtn" onclick="closePopup()">Sluiten</div>
    </div>
  </div>

<script>
function openPay(type, price) {
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('payTitle').innerText =
    `Betalen: ${type} (€${price})`;

  document.getElementById('formSection').style.display = 'block';
  document.getElementById('thanksSection').style.display = 'none';
}

function confirmPay() {
  document.getElementById('formSection').style.display = 'none';
  document.getElementById('thanksSection').style.display = 'block';
}

function closePopup() {
  document.getElementById('overlay').style.display = 'none';
}
</script>

</body>
</html>
